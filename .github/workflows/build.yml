name: Build Windows EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install pyinstaller dnspython ipinfo rich
      - run: pyinstaller --onefile --name rtmp-bench ton_script.py
      - uses: actions/upload-artifact@v3
        with:
          name: rtmp-bench.exe
          path: dist/rtmp-bench.exe