name: Build Windows EXE

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller -r requirements.txt
      - run: pyinstaller --onefile --name rtmp-bench main.py
      - uses: actions/upload-artifact@v4
        with:
          name: rtmp-bench.exe
          path: dist/rtmp-bench.exe
          
      - name: Publier le fichier EXE (Release)
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: latest
          name: Dernière Version Disponible
          files: dist/rtmp-bench.exe
          prerelease: true